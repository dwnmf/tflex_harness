name: release-build

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "MANIFEST.in"
      - "README.md"
      - "install.md"
      - "src/**"
      - ".github/workflows/release-build.yml"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update GitHub release assets"
        required: false
        default: false
        type: boolean
      tag:
        description: "Release tag for manual publish, e.g. v0.2.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-package:
    name: Build wheel and sdist
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke install wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist\tflex_harness-*-py3-none-any.whl | Select-Object -First 1
          python -m pip install $wheel.FullName "mcp>=1.0"
          tflex-harness --help
          tflex-harness bootstrap --no-docs --no-checks
          tflex-harness mcp-config --for codex

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: tflex-harness-dist
          path: dist/*
          retention-days: 1

      - name: Create or update GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($env:RELEASE_TAG_INPUT) {
            $tag = $env:RELEASE_TAG_INPUT
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with v, got: $tag"
          }
          $notes = "tflex-harness release $tag"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag dist/* --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title $tag --notes $notes
          } else {
            gh release create $tag dist/* --repo $env:GITHUB_REPOSITORY --title $tag --notes $notes
          }
